<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promoción · Ralarsa Inversiones S.L.</title>
    <script src="script.js" defer></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f7f7f7; }
        header { background: #fff; padding: 20px; border-bottom: 1px solid #ddd; }
        header h1 { margin: 0; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .galeria img {
            width: 100%;
            max-width: 400px;
            margin: 10px;
            border-radius: 8px;
        }
        .planos a {
            display: block;
            margin: 10px 0;
            color: #0078d7;
        }
    </style>
</head>
<body>

<header>
    <h1 id="titulo"></h1>
</header>

<div class="container">
    <p id="descripcion"></p>
    <p><strong>Estado:</strong> <span id="estado"></span></p>
    <p><strong>Ubicación:</strong> <span id="ubicacion"></span></p>

    <h3>Galería</h3>
    <div class="galeria" id="galeria"></div>

    <h3>Planos</h3>
    <div class="planos" id="planos"></div>
</div>

</body>
</html>
